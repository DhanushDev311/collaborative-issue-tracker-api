version: "3.9"

services:
  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/issueTrackerApi
      JWT_SECRET: change-me-in-production
      JWT_EXPIRES_IN: 7d
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
